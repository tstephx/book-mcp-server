name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/ --cov --cov-report=xml --cov-report=term-missing -q
        # No OPENAI_API_KEY — integration tests are skipped by pyproject.toml addopts default

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml

  changelog:
    name: Changelog Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG updated
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if ! git diff --name-only "origin/${BASE_REF}...HEAD" | grep -q "CHANGELOG.md"; then
            echo "warning: CHANGELOG.md not updated in this PR. Consider documenting your changes."
          else
            echo "ok: CHANGELOG.md updated."
          fi

      - name: Validate CHANGELOG format
        run: |
          python - <<'EOF'
          import re, sys
          try:
              with open("CHANGELOG.md") as f:
                  content = f.read()
          except FileNotFoundError:
              print("info: No CHANGELOG.md found, skipping format check")
              sys.exit(0)
          if not re.search(r"^## \[", content, re.MULTILINE):
              print("error: CHANGELOG.md missing version headers (## [Unreleased] or ## [x.y.z])")
              sys.exit(1)
          print("ok: CHANGELOG.md format valid")
          EOF

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .
